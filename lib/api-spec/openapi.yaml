openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: Synthetic population agents
  - name: surveys
    description: Survey instruments used to train the attitude model
  - name: simulations
    description: Policy simulation runs
  - name: calibration
    description: Calibration and validation records
  - name: products
    description: Product lines (Lumen / Seraph / Dynamo)
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List synthetic agents
      parameters:
        - name: district
          in: query
          required: false
          schema: { type: string }
        - name: gender
          in: query
          required: false
          schema: { type: string }
        - name: ageBracket
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /agents/summary:
    get:
      operationId: getAgentSummary
      tags: [agents]
      summary: Aggregate demographic and attitude breakdown of the population
      responses:
        "200":
          description: Population summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSummary"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get a single agent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys:
    get:
      operationId: listSurveys
      tags: [surveys]
      summary: List survey instruments used to train the attitude model
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a survey criterion with attitude drivers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyInput"
      responses:
        "201":
          description: Created survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get a single survey with its learned attitude drivers
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSurvey
      tags: [surveys]
      summary: Delete a survey criterion
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys/{id}/applied:
    patch:
      operationId: setSurveyApplied
      tags: [surveys]
      summary: Toggle whether a survey feeds the population's attitude generation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyApplyInput"
      responses:
        "200":
          description: Updated survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations:
    get:
      operationId: listSimulations
      tags: [simulations]
      summary: List simulation runs
      responses:
        "200":
          description: List of simulations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Simulation"
    post:
      operationId: createSimulation
      tags: [simulations]
      summary: Create a simulation (draft) and get a cost estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/estimate:
    post:
      operationId: estimateSimulation
      tags: [simulations]
      summary: Estimate the cost of a simulation before creating it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateInput"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"

  /simulations/{id}:
    get:
      operationId: getSimulation
      tags: [simulations]
      summary: Get a simulation with aggregated results
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Simulation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSimulation
      tags: [simulations]
      summary: Delete a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/run:
    post:
      operationId: runSimulation
      tags: [simulations]
      summary: Start the LLM run for a simulation (asynchronous; poll the simulation for progress)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/responses:
    get:
      operationId: listSimulationResponses
      tags: [simulations]
      summary: Per-agent responses for a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimulationResponse"

  /calibration:
    get:
      operationId: listCalibrations
      tags: [calibration]
      summary: Calibration / validation records against virtual past results
      responses:
        "200":
          description: Calibration records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calibration"

  /calibration/elections:
    get:
      operationId: getElectionCalibration
      tags: [calibration]
      summary: Election-grounded calibration — synthetic prediction vs real results
      responses:
        "200":
          description: Election calibration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElectionCalibrationResult"

  /elections:
    get:
      operationId: listElections
      tags: [calibration]
      summary: Real past election results used as calibration ground truth
      responses:
        "200":
          description: Elections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Election"

  /regions:
    get:
      operationId: listRegions
      tags: [population]
      summary: The 17 시도 regions with geo + political metadata
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"

  /admin/demographic-margins:
    get:
      operationId: listDemographicMargins
      tags: [admin]
      summary: Official region/age/gender marginals used as raking targets
      responses:
        "200":
          description: Demographic margins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemographicMargin"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: Product lines mapped to audiences
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Top-level KPIs for the dashboard home
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/data-sources:
    get:
      operationId: listDataSources
      tags: [admin]
      summary: Public data sources the synthetic population is derived from
      responses:
        "200":
          description: List of data sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataSource"

  /admin/population/regenerate:
    post:
      operationId: regeneratePopulation
      tags: [admin]
      summary: Regenerate the synthetic population with a new agent count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegeneratePopulationInput"
      responses:
        "200":
          description: Result of regeneration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegeneratePopulationResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-uploads:
    get:
      operationId: listSurveyUploads
      tags: [admin]
      summary: List uploaded survey-criteria files
      responses:
        "200":
          description: List of survey uploads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurveyUpload"
    post:
      operationId: createSurveyUpload
      tags: [admin]
      summary: Upload a survey-criteria file (parsed client-side to rows)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyUploadInput"
      responses:
        "201":
          description: Created survey upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyUpload"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibration-settings:
    get:
      operationId: getCalibrationSettings
      tags: [admin]
      summary: Current calibration & validation settings
      responses:
        "200":
          description: Calibration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationSettings"
    put:
      operationId: updateCalibrationSettings
      tags: [admin]
      summary: Update calibration & validation settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalibrationSettingsInput"
      responses:
        "200":
          description: Updated calibration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibrations:
    post:
      operationId: createCalibration
      tags: [admin]
      summary: Upload a past validation event (calibrated values derived from settings)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalibrationInput"
      responses:
        "201":
          description: Created calibration event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calibration"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibrations/{id}:
    delete:
      operationId: deleteCalibration
      tags: [admin]
      summary: Delete a validation event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-uploads/suggest-drivers:
    post:
      operationId: suggestSurveyDrivers
      tags: [admin]
      summary: LLM-assisted draft mapping of uploaded survey columns to attitude drivers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestDriversInput"
      responses:
        "200":
          description: Suggested drivers (draft for human confirmation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestDriversResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-impact:
    get:
      operationId: getSurveyImpact
      tags: [admin]
      summary: Per-issue persona-generation impact from currently-applied surveys
      responses:
        "200":
          description: Survey impact preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyImpactResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Agent:
      type: object
      required:
        - id
        - name
        - age
        - ageBracket
        - gender
        - district
        - lat
        - lng
        - education
        - incomeBracket
        - occupation
        - householdType
        - politicalLeaning
        - partyAffinity
        - turnoutPropensity
        - issueStances
        - consumerStances
        - policyStances
        - mediaDiet
        - values
        - personaSummary
      properties:
        id: { type: integer }
        name: { type: string }
        age: { type: integer }
        ageBracket: { type: string }
        gender: { type: string }
        district: { type: string }
        lat: { type: number }
        lng: { type: number }
        education: { type: string }
        incomeBracket: { type: string }
        occupation: { type: string }
        householdType: { type: string }
        politicalLeaning: { type: integer }
        partyAffinity: { type: string }
        turnoutPropensity: { type: integer }
        issueStances:
          $ref: "#/components/schemas/IssueStances"
        consumerStances:
          $ref: "#/components/schemas/ConsumerStances"
        policyStances:
          $ref: "#/components/schemas/PolicyStances"
        mediaDiet: { type: string }
        values:
          type: array
          items: { type: string }
        personaSummary: { type: string }

    IssueStances:
      type: object
      required: [economy, welfare, security, environment, housing]
      properties:
        economy: { type: integer }
        welfare: { type: integer }
        security: { type: integer }
        environment: { type: integer }
        housing: { type: integer }

    ConsumerStances:
      type: object
      required:
        - priceSensitivity
        - brandLoyalty
        - noveltySeeking
        - ecoConsciousness
        - digitalConsumption
      properties:
        priceSensitivity: { type: integer }
        brandLoyalty: { type: integer }
        noveltySeeking: { type: integer }
        ecoConsciousness: { type: integer }
        digitalConsumption: { type: integer }

    PolicyStances:
      type: object
      required:
        - governmentTrust
        - policyAcceptance
        - taxTolerance
        - regulationPreference
        - publicServiceSatisfaction
      properties:
        governmentTrust: { type: integer }
        policyAcceptance: { type: integer }
        taxTolerance: { type: integer }
        regulationPreference: { type: integer }
        publicServiceSatisfaction: { type: integer }

    BreakdownItem:
      type: object
      required: [key, count]
      properties:
        key: { type: string }
        count: { type: integer }
        avgLeaning: { type: ["number", "null"] }

    AgentSummary:
      type: object
      required:
        - total
        - byDistrict
        - byAgeBracket
        - byGender
        - byLeaning
        - avgTurnout
        - avgLeaning
      properties:
        total: { type: integer }
        byDistrict:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byAgeBracket:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byGender:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byLeaning:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        avgTurnout: { type: number }
        avgLeaning: { type: number }

    SurveyDriver:
      type: object
      required: [factor, issue, weight, direction]
      properties:
        factor: { type: string }
        issue: { type: string }
        weight: { type: number }
        direction: { type: string }
        targetStance: { type: number, minimum: -100, maximum: 100 }

    Survey:
      type: object
      required:
        - id
        - title
        - description
        - methodology
        - sampleSize
        - fieldedDate
        - status
        - reliability
        - drivers
        - appliedToPopulation
        - domain
        - isReal
        - sourceAgency
        - sourceTitle
        - fieldPeriod
        - sourceUrl
        - createdAt
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        methodology: { type: string }
        sampleSize: { type: integer }
        fieldedDate: { type: string }
        status: { type: string }
        reliability: { type: number }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/SurveyDriver" }
        appliedToPopulation: { type: boolean }
        domain: { type: string, enum: [political, commercial, policy] }
        isReal: { type: boolean }
        sourceAgency: { type: string, nullable: true }
        sourceTitle: { type: string, nullable: true }
        fieldPeriod: { type: string, nullable: true }
        sourceUrl: { type: string, nullable: true }
        createdAt: { type: string }

    SurveyInput:
      type: object
      required: [title, drivers]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        methodology: { type: string }
        sampleSize: { type: integer }
        fieldedDate: { type: string }
        reliability: { type: number }
        appliedToPopulation: { type: boolean }
        domain: { type: string, enum: [political, commercial, policy] }
        isReal: { type: boolean }
        sourceAgency: { type: string }
        sourceTitle: { type: string }
        fieldPeriod: { type: string }
        sourceUrl: { type: string }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/SurveyDriver" }

    SurveyApplyInput:
      type: object
      required: [appliedToPopulation]
      properties:
        appliedToPopulation: { type: boolean }

    SuggestDriversInput:
      type: object
      required: [sampleRows]
      properties:
        fileName: { type: string }
        description: { type: string }
        columns:
          type: array
          items: { type: string }
        sampleRows:
          type: array
          items:
            type: object
            additionalProperties: { type: string }

    SuggestDriversResult:
      type: object
      required: [summary, drivers]
      properties:
        summary: { type: string }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/SurveyDriver" }

    SurveyImpactItem:
      type: object
      required: [issue, key, weightSum, multiplier, noiseScale, driverCount]
      properties:
        issue: { type: string }
        key: { type: string }
        weightSum: { type: number }
        multiplier: { type: number }
        noiseScale: { type: number }
        driverCount: { type: integer }
        targetMean: { type: number, nullable: true }
        targetPull: { type: number }

    SurveyImpactResult:
      type: object
      required: [appliedSurveyCount, items]
      properties:
        appliedSurveyCount: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/SurveyImpactItem" }

    Simulation:
      type: object
      required:
        - id
        - title
        - audience
        - product
        - policyText
        - model
        - status
        - progress
        - totalAgents
        - costEstimateUsd
        - createdAt
      properties:
        id: { type: integer }
        title: { type: string }
        audience: { type: string }
        product: { type: string }
        policyText: { type: string }
        model: { type: string }
        status: { type: string }
        progress: { type: integer }
        totalAgents: { type: integer }
        costEstimateUsd: { type: number }
        costActualUsd: { type: ["number", "null"] }
        overallSupport: { type: ["number", "null"] }
        supportPct: { type: ["number", "null"] }
        opposePct: { type: ["number", "null"] }
        neutralPct: { type: ["number", "null"] }
        summary: { type: ["string", "null"] }
        createdAt: { type: string }
        completedAt: { type: ["string", "null"] }

    SimulationInput:
      type: object
      required: [title, audience, product, policyText]
      properties:
        title: { type: string, minLength: 1 }
        audience: { type: string }
        product: { type: string }
        policyText: { type: string, minLength: 1 }
        model: { type: string }

    EstimateInput:
      type: object
      required: [model]
      properties:
        model: { type: string }
        totalAgents: { type: integer }

    CostEstimate:
      type: object
      required:
        - model
        - totalAgents
        - inputTokensPerAgent
        - outputTokensPerAgent
        - estimatedCostUsd
        - estimatedLowUsd
        - estimatedHighUsd
        - estimatedSeconds
      properties:
        model: { type: string }
        totalAgents: { type: integer }
        inputTokensPerAgent: { type: integer }
        outputTokensPerAgent: { type: integer }
        estimatedCostUsd: { type: number }
        estimatedLowUsd: { type: number }
        estimatedHighUsd: { type: number }
        estimatedSeconds: { type: integer }

    GroupResult:
      type: object
      required: [key, count, supportPct, opposePct, neutralPct, avgScore]
      properties:
        key: { type: string }
        count: { type: integer }
        supportPct: { type: number }
        opposePct: { type: number }
        neutralPct: { type: number }
        avgScore: { type: number }

    PolicyAxisResult:
      type: object
      required: [axis, label, segments]
      properties:
        axis: { type: string }
        label: { type: string }
        segments:
          type: array
          items: { $ref: "#/components/schemas/GroupResult" }

    SimulationResults:
      type: object
      required: [byDistrict, byAgeBracket, byGender, byLeaning]
      properties:
        byDistrict:
          type: array
          items: { $ref: "#/components/schemas/GroupResult" }
        byAgeBracket:
          type: array
          items: { $ref: "#/components/schemas/GroupResult" }
        byGender:
          type: array
          items: { $ref: "#/components/schemas/GroupResult" }
        byLeaning:
          type: array
          items: { $ref: "#/components/schemas/GroupResult" }
        byPolicyAxis:
