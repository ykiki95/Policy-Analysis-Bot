openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: 인증 (회원가입 / 로그인 / 로그아웃)
  - name: agents
    description: Synthetic population agents
  - name: surveys
    description: Survey instruments used to train the attitude model
  - name: simulations
    description: Policy simulation runs
  - name: calibration
    description: Calibration and validation records
  - name: products
    description: Product lines (Lumen / Seraph / Dynamo)
  - name: dashboard
    description: Dashboard aggregates
  - name: signals
    description: Realtime signal ingest batches (demo)
  - name: analytics
    description: 접속 분석(방문자/세션/메뉴/위치 추적)
paths:
  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List all signal ingest batches (global, collectedAt desc)
      responses:
        "200":
          description: List of signal batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalBatch"
  /signals/{id}:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get a single signal batch
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Signal batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalBatch"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/signals:
    post:
      operationId: createSignal
      tags: [signals]
      summary: Create a signal batch (admin). Effect numbers are deterministic mock.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalInput"
      responses:
        "201":
          description: Created signal batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalBatch"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /signals/settings:
    get:
      operationId: getSignalSettings
      tags: [signals]
      summary: Get the global signal ingest settings (shared by all users)
      responses:
        "200":
          description: Signal settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSettings"
  /admin/signals/settings:
    put:
      operationId: updateSignalSettings
      tags: [signals]
      summary: Upsert signal ingest settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalSettingsInput"
      responses:
        "200":
          description: Updated signal settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/signals/auto:
    post:
      operationId: autoCollectSignals
      tags: [signals]
      summary: Auto-collect signal batches from a hardcoded sample pool (admin)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalAutoInput"
      responses:
        "201":
          description: Created signal batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalBatch"
  /admin/signals/reset:
    post:
      operationId: resetSignals
      tags: [signals]
      summary: Delete all signal batches and reseed sample batches (admin)
      responses:
        "201":
          description: Reseeded signal batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalBatch"
  /admin/signals/{id}:
    patch:
      operationId: updateSignal
      tags: [signals]
      summary: Partially update a signal batch (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalPatchInput"
      responses:
        "200":
          description: Updated signal batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalBatch"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSignal
      tags: [signals]
      summary: Delete a signal batch (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: 회원가입 후 자동 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 잘못된 입력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: 아이디 중복
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: 로그인한 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 잘못된 입력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 로그아웃
      responses:
        "204":
          description: 로그아웃 완료

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: 현재 로그인 사용자
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: 미로그인
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /me/profile:
    put:
      operationId: updateProfile
      tags: [auth]
      summary: 내 프로필(이름·아바타) 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: 갱신된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 잘못된 입력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 미로그인
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /me/password:
    put:
      operationId: changePassword
      tags: [auth]
      summary: 내 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: 변경 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: 잘못된 입력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 현재 비밀번호 불일치 또는 미로그인
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List synthetic agents
      parameters:
        - name: district
          in: query
          required: false
          schema: { type: string }
        - name: gender
          in: query
          required: false
          schema: { type: string }
        - name: ageBracket
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /agents/summary:
    get:
      operationId: getAgentSummary
      tags: [agents]
      summary: Aggregate demographic and attitude breakdown of the population
      responses:
        "200":
          description: Population summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSummary"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get a single agent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys:
    get:
      operationId: listSurveys
      tags: [surveys]
      summary: List survey instruments used to train the attitude model
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a survey criterion with attitude drivers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyInput"
      responses:
        "201":
          description: Created survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get a single survey with its learned attitude drivers
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSurvey
      tags: [surveys]
      summary: Delete a survey criterion
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /surveys/{id}/applied:
    patch:
      operationId: setSurveyApplied
      tags: [surveys]
      summary: Toggle whether a survey feeds the population's attitude generation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyApplyInput"
      responses:
        "200":
          description: Updated survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations:
    get:
      operationId: listSimulations
      tags: [simulations]
      summary: List simulation runs
      responses:
        "200":
          description: List of simulations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Simulation"
    post:
      operationId: createSimulation
      tags: [simulations]
      summary: Create a simulation (draft) and get a cost estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/estimate:
    post:
      operationId: estimateSimulation
      tags: [simulations]
      summary: Estimate the cost of a simulation before creating it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateInput"
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"

  /simulations/{id}:
    get:
      operationId: getSimulation
      tags: [simulations]
      summary: Get a simulation with aggregated results
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Simulation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSimulation
      tags: [simulations]
      summary: Delete a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/run:
    post:
      operationId: runSimulation
      tags: [simulations]
      summary: Start the LLM run for a simulation (asynchronous; poll the simulation for progress)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/stop:
    post:
      operationId: stopSimulation
      tags: [simulations]
      summary: Stop a queued/running simulation and reset it to a re-runnable (pending) state
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Stopped simulation (reset to pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/tick:
    post:
      operationId: tickSimulation
      tags: [simulations]
      summary: Advance a queued/running simulation by one batch (client-driven processing; call repeatedly while viewing progress)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated simulation after the batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/actual:
    post:
      operationId: enterSimulationActual
      tags: [simulations]
      summary: Record the actual observed outcome for a completed simulation (computes prediction error)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterActualInput"
      responses:
        "200":
          description: Updated simulation with actual + prediction error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "400":
          description: Invalid input or simulation not yet completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/learn:
    post:
      operationId: learnFromSimulation
      tags: [simulations]
      summary: Admin — turn a simulation's prediction-vs-actual into a calibration event (records learnedAt)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Learning applied; calibration event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnSimulationResult"
        "400":
          description: Actual value not entered yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulations/{id}/responses:
    get:
      operationId: listSimulationResponses
      tags: [simulations]
      summary: Per-agent responses for a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimulationResponse"

  /calibration:
    get:
      operationId: listCalibrations
      tags: [calibration]
      summary: Calibration / validation records against virtual past results
      responses:
        "200":
          description: Calibration records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calibration"

  /calibration/elections:
    get:
      operationId: getElectionCalibration
      tags: [calibration]
      summary: Election-grounded calibration — synthetic prediction vs real results
      responses:
        "200":
          description: Election calibration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElectionCalibrationResult"

  /elections:
    get:
      operationId: listElections
      tags: [calibration]
      summary: Real past election results used as calibration ground truth
      responses:
        "200":
          description: Elections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Election"

  /regions:
    get:
      operationId: listRegions
      tags: [population]
      summary: The 17 시도 regions with geo + political metadata
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"

  /admin/demographic-margins:
    get:
      operationId: listDemographicMargins
      tags: [admin]
      summary: Official region/age/gender marginals used as raking targets
      responses:
        "200":
          description: Demographic margins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemographicMargin"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: Product lines mapped to audiences
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Top-level KPIs for the dashboard home
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /budget:
    get:
      operationId: getBudget
      tags: [budget]
      summary: 현재 사용자의 예산 한도/지출 현황(화면 표시 금액 ×10)
      responses:
        "200":
          description: 예산 현황
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetStatus"
        "401":
          description: 미로그인
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/accounts:
    get:
      operationId: listAdminAccounts
      tags: [admin]
      summary: 전체 계정 목록 + 예산/지출(관리자 전용, 화면 표시 금액 ×10)
      responses:
        "200":
          description: 계정 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAccount"

  /admin/accounts/{id}/budget:
    put:
      operationId: updateAccountBudget
      tags: [admin]
      summary: 계정별 예산 한도 설정(관리자 전용, 입력은 화면 표시 금액 ×10)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBudgetInput"
      responses:
        "200":
          description: 갱신된 계정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccount"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 계정 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/accounts/{id}/reset-password:
    post:
      operationId: resetAccountPassword
      tags: [admin]
      summary: 회원 비밀번호 초기화(관리자 전용, "1111")
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 초기화 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404":
          description: 계정 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/data-sources:
    get:
      operationId: listDataSources
      tags: [admin]
      summary: Public data sources the synthetic population is derived from
      responses:
        "200":
          description: List of data sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataSource"

  /admin/population/regenerate:
    post:
      operationId: regeneratePopulation
      tags: [admin]
      summary: Regenerate the synthetic population with a new agent count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegeneratePopulationInput"
      responses:
        "200":
          description: Result of regeneration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegeneratePopulationResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-uploads:
    get:
      operationId: listSurveyUploads
      tags: [admin]
      summary: List uploaded survey-criteria files
      responses:
        "200":
          description: List of survey uploads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurveyUpload"
    post:
      operationId: createSurveyUpload
      tags: [admin]
      summary: Upload a survey-criteria file (parsed client-side to rows)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyUploadInput"
      responses:
        "201":
          description: Created survey upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyUpload"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibration-settings:
    get:
      operationId: getCalibrationSettings
      tags: [admin]
      summary: Current calibration & validation settings
      responses:
        "200":
          description: Calibration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationSettings"
    put:
      operationId: updateCalibrationSettings
      tags: [admin]
      summary: Update calibration & validation settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalibrationSettingsInput"
      responses:
        "200":
          description: Updated calibration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalibrationSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibrations:
    post:
      operationId: createCalibration
      tags: [admin]
      summary: Upload a past validation event (calibrated values derived from settings)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalibrationInput"
      responses:
        "201":
          description: Created calibration event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calibration"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/calibrations/{id}:
    delete:
      operationId: deleteCalibration
      tags: [admin]
      summary: Delete a validation event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-uploads/suggest-drivers:
    post:
      operationId: suggestSurveyDrivers
      tags: [admin]
      summary: LLM-assisted draft mapping of uploaded survey columns to attitude drivers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestDriversInput"
      responses:
        "200":
          description: Suggested drivers (draft for human confirmation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestDriversResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/survey-impact:
    get:
      operationId: getSurveyImpact
      tags: [admin]
      summary: Per-issue persona-generation impact from currently-applied surveys
      responses:
        "200":
          description: Survey impact preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyImpactResult"

  /admin/elections:
    get:
      operationId: listElectionBacktests
      tags: [admin]
      summary: Registered election backtests (grouped ground-truth) for management
      responses:
        "200":
          description: Registered election backtests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ElectionBacktestSummary"

  /admin/elections/manual:
    post:
      operationId: createManualElection
      tags: [admin]
      summary: Manually register an election/poll backtest with per-region conservative shares
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualElectionInput"
      responses:
        "200":
          description: Created backtest summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElectionBacktestSummary"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/elections/{electionDate}:
    delete:
      operationId: deleteElectionBacktest
      tags: [admin]
      summary: Delete a registered election backtest (all rows for that electionDate)
      parameters:
        - name: electionDate
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteElectionResult"

  /admin/elections/sources:
    get:
      operationId: listElectionSources
      tags: [admin]
      summary: Presidential elections available to import from data.go.kr (NEC)
      responses:
        "200":
          description: Supported election sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ElectionSource"

  /admin/elections/import:
    post:
      operationId: importElection
      tags: [admin]
      summary: Import real NEC election results from data.go.kr into the elections ground truth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportElectionInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportElectionResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream data.go.kr failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /track:
    post:
      operationId: trackEvent
      tags: [analytics]
      summary: 접속 분석 비콘 수집(비로그인 허용, fire-and-forget)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventInput"
      responses:
        "204":
          description: 기록됨
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [analytics]
      summary: 접속 분석 집계(관리자 전용)
      parameters:
        - name: days
          in: query
          required: false
          description: 집계 기간(일). 0 = 전체.
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: 접속 분석 집계
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    TrackEventInput:
      type: object
      description: 프런트 접속 분석 비콘 페이로드.
      required:
        - clientId
        - sessionId
        - path
        - type
      properties:
        clientId: { type: string, minLength: 1, maxLength: 80 }
        sessionId: { type: string, minLength: 1, maxLength: 80 }
        path: { type: string, minLength: 1, maxLength: 300 }
        type: { type: string, enum: [pageview, heartbeat] }

    AnalyticsSummary:
      type: object
      required:
        - totalEvents
        - totalSessions
        - uniqueVisitors
        - loggedInAccounts
        - anonymousSessions
        - totalMinutes
        - mobileSessions
        - desktopSessions
        - tabletSessions
        - loginSuccess
        - loginFail
      properties:
        totalEvents: { type: integer }
        totalSessions: { type: integer }
        uniqueVisitors: { type: integer }
        loggedInAccounts: { type: integer }
        anonymousSessions: { type: integer }
        totalMinutes: { type: number }
        mobileSessions: { type: integer }
        desktopSessions: { type: integer }
        tabletSessions: { type: integer }
        loginSuccess: { type: integer }
        loginFail: { type: integer }

    AnalyticsAccount:
      type: object
      required:
        - userId
        - username
        - name
        - role
        - sessions
        - events
        - pageviews
        - totalMinutes
        - firstSeenAt
        - lastSeenAt
        - mobileSessions
        - desktopSessions
      properties:
        userId: { type: integer }
        username: { type: string }
        name: { type: string }
        role: { type: string }
        sessions: { type: integer }
        events: { type: integer }
        pageviews: { type: integer }
        totalMinutes: { type: number }
        firstSeenAt: { type: string }
        lastSeenAt: { type: string }
        mobileSessions: { type: integer }
        desktopSessions: { type: integer }

    AnalyticsAnon:
      type: object
      required: [sessions, events, totalMinutes]
      properties:
        sessions: { type: integer }
        events: { type: integer }
        totalMinutes: { type: number }

    AnalyticsMenu:
      type: object
      required: [path, views, heartbeats, sessions, visitors, totalMinutes]
      properties:
        path: { type: string }
        views: { type: integer }
        heartbeats: { type: integer }
        sessions: { type: integer }
        visitors: { type: integer }
        totalMinutes: { type: number }

    AnalyticsDevice:
      type: object
      required: [deviceType, sessions, events]
      properties:
        deviceType: { type: string }
        sessions: { type: integer }
        events: { type: integer }

    AnalyticsBrowser:
      type: object
      required: [browser, sessions]
      properties:
        browser: { type: string }
        sessions: { type: integer }

    AnalyticsLocation:
      type: object
      required: [country, countryCode, region, city, sessions, visitors]
      properties:
        country: { type: string, nullable: true }
        countryCode: { type: string, nullable: true }
        region: { type: string, nullable: true }
        city: { type: string, nullable: true }
        sessions: { type: integer }
        visitors: { type: integer }

    AnalyticsSession:
      type: object
      required:
        - sessionId
        - userId
        - username
        - name
        - ip
        - deviceType
        - browser
        - os
        - country
        - region
        - city
        - startAt
        - endAt
        - durationMinutes
        - pageviews
        - events
      properties:
        sessionId: { type: string }
        userId: { type: integer, nullable: true }
        username: { type: string, nullable: true }
        name: { type: string, nullable: true }
        ip: { type: string, nullable: true }
        deviceType: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        os: { type: string, nullable: true }
        country: { type: string, nullable: true }
        region: { type: string, nullable: true }
        city: { type: string, nullable: true }
        startAt: { type: string }
        endAt: { type: string }
        durationMinutes: { type: number }
        pageviews: { type: integer }
        events: { type: integer }

    AnalyticsDaily:
      type: object
      required: [date, events, sessions, visitors]
      properties:
        date: { type: string }
        events: { type: integer }
        sessions: { type: integer }
        visitors: { type: integer }

    AnalyticsResponse:
      type: object
      required:
        - rangeDays
        - summary
        - accounts
        - anonymous
        - menus
        - devices
        - browsers
        - locations
        - sessions
        - daily
      properties:
        rangeDays: { type: integer }
        summary: { $ref: "#/components/schemas/AnalyticsSummary" }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsAccount" }
        anonymous: { $ref: "#/components/schemas/AnalyticsAnon" }
        menus:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsMenu" }
        devices:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsDevice" }
        browsers:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsBrowser" }
        locations:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsLocation" }
        sessions:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsSession" }
        daily:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsDaily" }

    User:
      type: object
      required:
        - id
        - username
        - name
        - role
        - createdAt
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        birthDate: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        role: { type: string }
        createdAt: { type: string }

    BudgetStatus:
      type: object
      description: 모든 금액은 실제 LLM 실비(USD)다. 화면 표시 배수는 프런트가 적용한다.
      required:
        - limitUsd
        - spentUsd
        - remainingUsd
      properties:
        limitUsd: { type: number }
        spentUsd: { type: number }
        remainingUsd: { type: number }

    AdminAccount:
      type: object
      description: 예산 금액은 실제 LLM 실비(USD)다. 화면 표시 배수는 프런트가 적용한다.
      required:
        - id
        - username
        - name
        - role
        - createdAt
        - budgetLimitUsd
        - spentUsd
        - remainingUsd
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        avatar: { type: string, nullable: true }
        role: { type: string }
        createdAt: { type: string }
        budgetLimitUsd: { type: number }
        spentUsd: { type: number }
        remainingUsd: { type: number }
        password: { type: string, nullable: true, description: "데모 전용 평문 비밀번호 미러(없으면 null)" }

    UpdateAccountBudgetInput:
      type: object
      description: 입력 금액은 실제 LLM 실비(USD)다. 화면 표시 배수는 프런트가 적용한다.
      required:
        - budgetLimitUsd
      properties:
        budgetLimitUsd: { type: number, minimum: 0 }

    UpdateProfileInput:
      type: object
      required:
        - name
      properties:
        name: { type: string, minLength: 1 }
        avatar: { type: string, nullable: true }
        birthDate: { type: string, nullable: true }

    ChangePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword: { type: string, minLength: 1 }
        newPassword: { type: string, minLength: 4 }

    OkResult:
      type: object
      required:
        - ok
      properties:
        ok: { type: boolean }

    SignupInput:
      type: object
      required:
        - name
        - username
        - password
      properties:
        name: { type: string, minLength: 1 }
        username: { type: string, minLength: 1 }
        birthDate: { type: string }
        password: { type: string, minLength: 1 }

    LoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }

    Agent:
      type: object
      required:
        - id
        - name
        - age
        - ageBracket
        - gender
        - district
        - lat
        - lng
        - education
        - incomeBracket
        - occupation
        - householdType
        - politicalLeaning
        - partyAffinity
        - turnoutPropensity
        - issueStances
        - consumerStances
        - policyStances
        - mediaDiet
        - values
        - personaSummary
      properties:
        id: { type: integer }
        name: { type: string }
        age: { type: integer }
        ageBracket: { type: string }
        gender: { type: string }
        district: { type: string }
        lat: { type: number }
        lng: { type: number }
        education: { type: string }
        incomeBracket: { type: string }
        occupation: { type: string }
        householdType: { type: string }
        politicalLeaning: { type: integer }
        partyAffinity: { type: string }
        turnoutPropensity: { type: integer }
        issueStances:
          $ref: "#/components/schemas/IssueStances"
        consumerStances:
          $ref: "#/components/schemas/ConsumerStances"
        policyStances:
          $ref: "#/components/schemas/PolicyStances"
        mediaDiet: { type: string }
        values:
          type: array
          items: { type: string }
        personaSummary: { type: string }

    IssueStances:
      type: object
      required: [economy, welfare, security, environment, housing]
      properties:
        economy: { type: integer }
        welfare: { type: integer }
        security: { type: integer }
        environment: { type: integer }
        housing: { type: integer }

    ConsumerStances:
      type: object
      required:
        - priceSensitivity
        - brandLoyalty
        - noveltySeeking
        - ecoConsciousness
        - digitalConsumption
      properties:
        priceSensitivity: { type: integer }
        brandLoyalty: { type: integer }
        noveltySeeking: { type: integer }
        ecoConsciousness: { type: integer }
        digitalConsumption: { type: integer }

    PolicyStances:
      type: object
      required:
        - governmentTrust
        - policyAcceptance
        - taxTolerance
        - regulationPreference
        - publicServiceSatisfaction
      properties:
        governmentTrust: { type: integer }
        policyAcceptance: { type: integer }
        taxTolerance: { type: integer }
        regulationPreference: { type: integer }
        publicServiceSatisfaction: { type: integer }

    BreakdownItem:
      type: object
      required: [key, count]
      properties:
        key: { type: string }
        count: { type: integer }
        avgLeaning: { type: ["number", "null"] }

    AgentSummary:
      type: object
      required:
        - total
        - byDistrict
        - byAgeBracket
        - byGender
        - byLeaning
        - avgTurnout
        - avgLeaning
      properties:
        total: { type: integer }
        byDistrict:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byAgeBracket:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byGender:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        byLeaning:
          type: array
          items: { $ref: "#/components/schemas/BreakdownItem" }
        avgTurnout: { type: number }
        avgLeaning: { type: number }

    SignalBatch:
      type: object
      required:
        - id
        - source
        - title
        - collectedAt
        - itemCount
        - sentimentPos
        - sentimentNeu
        - sentimentNeg
        - summary
        - linkedProduct
        - linkedSimulationId
        - metric
        - valueBefore
        - valueAfter
        - status
        - createdAt
      properties:
        id: { type: integer }
        source: { type: string }
        title: { type: string }
        collectedAt: { type: string }
        itemCount: { type: integer }
        sentimentPos: { type: integer }
        sentimentNeu: { type: integer }
        sentimentNeg: { type: integer }
        summary: { type: string }
        linkedProduct: { type: string }
        linkedSimulationId: { type: integer, nullable: true }
        metric: { type: string }
        valueBefore: { type: number }
        valueAfter: { type: number }
        status: { type: string }
        createdAt: { type: string }

    SignalInput:
      type: object
      required: [source, linkedProduct]
      properties:
        source: { type: string, enum: ["뉴스", "검색트렌드", "SNS·커뮤니티"] }
        title: { type: string }
        linkedProduct: { type: string, enum: [Lumen, Seraph, Dynamo] }
        linkedSimulationId: { type: integer, nullable: true }
        itemCount: { type: integer }

    SignalSettings:
      type: object
      required:
        - id
        - userId
        - sourceNewsEnabled
        - sourceTrendEnabled
        - sourceSnsEnabled
        - sourceNewsWeight
        - sourceTrendWeight
        - sourceSnsWeight
        - applyToPrediction
        - scheduleEnabled
        - scheduleInterval
        - filterBotRemoval
        - filterDedup
        - filterMinItems
        - updatedAt
      properties:
        id: { type: integer }
        userId: { type: integer }
        sourceNewsEnabled: { type: boolean }
        sourceTrendEnabled: { type: boolean }
        sourceSnsEnabled: { type: boolean }
        sourceNewsWeight: { type: number }
        sourceTrendWeight: { type: number }
        sourceSnsWeight: { type: number }
        applyToPrediction: { type: boolean }
        scheduleEnabled: { type: boolean }
        scheduleInterval: { type: string }
        filterBotRemoval: { type: boolean }
        filterDedup: { type: boolean }
        filterMinItems: { type: integer }
        updatedAt: { type: string }

    SignalSettingsInput:
      type: object
      required:
        - sourceNewsEnabled
        - sourceTrendEnabled
        - sourceSnsEnabled
        - sourceNewsWeight
        - sourceTrendWeight
        - sourceSnsWeight
        - applyToPrediction
        - scheduleEnabled
        - scheduleInterval
        - filterBotRemoval
        - filterDedup
        - filterMinItems
      properties:
        sourceNewsEnabled: { type: boolean }
        sourceTrendEnabled: { type: boolean }
        sourceSnsEnabled: { type: boolean }
        sourceNewsWeight: { type: number, minimum: 0, maximum: 2 }
        sourceTrendWeight: { type: number, minimum: 0, maximum: 2 }
        sourceSnsWeight: { type: number, minimum: 0, maximum: 2 }
        applyToPrediction: { type: boolean }
        scheduleEnabled: { type: boolean }
        scheduleInterval: { type: string, enum: ["수동", "매시간", "매일"] }
        filterBotRemoval: { type: boolean }
        filterDedup: { type: boolean }
        filterMinItems: { type: integer, minimum: 0 }

    SignalPatchInput:
      type: object
      properties:
        source: { type: string, enum: ["뉴스", "검색트렌드", "SNS·커뮤니티"] }
        title: { type: string }
        linkedProduct: { type: string, enum: [Lumen, Seraph, Dynamo] }
        linkedSimulationId: { type: integer, nullable: true }
        collectedAt: { type: string }
        sentimentPos: { type: integer }
        sentimentNeu: { type: integer }
        sentimentNeg: { type: integer }
        valueBefore: { type: number }
        valueAfter: { type: number }
        direction: { type: string, enum: [up, down] }
        magnitude: { type: number }

    SignalAutoInput:
      type: object
      properties:
        count: { type: integer, minimum: 1, maximum: 8 }
        source: { type: string, enum: ["뉴스", "검색트렌드", "SNS·커뮤니티"] }

    SurveyDriver:
      type: object
      required: [factor, issue, weight, direction]
      properties:
        factor: { type: string }
        issue: { type: string }
        weight: { type: number }
        direction: { type: string }
        targetStance: { type: number, minimum: -100, maximum: 100 }

    Survey:
